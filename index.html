<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medo Style Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --primary: #ff6d00; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #admin-trigger { color: var(--primary); font-size: 2.5rem; cursor: pointer; user-select: none; margin: 20px 0; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .day { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; font-size: 0.85rem; }
        .day.active { border: 2px solid var(--primary); background: #1a1a1a; }
        .day b { color: var(--primary); display: block; margin-bottom: 4px; }

        .status-bar { padding: 10px 25px; border-radius: 25px; margin-bottom: 20px; font-weight: bold; font-size: 1rem; }
        .open { background: #1b5e20; color: #4caf50; border: 1px solid #4caf50; }
        .closed { background: #b71c1c; color: #ff5252; border: 1px solid #ff5252; }

        .booking-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #222; box-sizing: border-box; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #181818; color: #fff; text-align: center; font-size: 1rem; outline: none; box-sizing: border-box; }
        input[type="time"] { color-scheme: dark; font-family: monospace; font-weight: bold; }

        .btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-call-main { background: #0288d1; padding: 12px; border-radius: 10px; text-decoration: none; color: white; text-align: center; font-weight: bold; font-size: 0.9rem; }
        .btn-wa-main { background: #25d366; padding: 12px; border-radius: 10px; text-decoration: none; color: white; text-align: center; font-weight: bold; font-size: 0.9rem; }

        #admin-panel { display: none; background: #1a1a1a; width: 100%; max-width: 400px; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 2px dashed var(--primary); box-sizing: border-box; }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #222; padding: 8px; border-radius: 8px; }
        .admin-row input { width: 50px; margin: 0 5px; padding: 5px; background: #333; color: white; border: none; text-align: center; }

        .list { width: 100%; max-width: 400px; margin-top: 25px; }
        .row { background: #0f0f0f; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-right: 5px solid var(--primary); }
        .row-top { display: flex; justify-content: space-between; align-items: center; }
        .admin-controls { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; flex-wrap: wrap; }
        .btn-s { flex: 1; min-width: 80px; padding: 10px; border-radius: 8px; border: none; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-decoration: none; text-align: center; }
        .btn-alert { background: #ffd600 !important; color: #000 !important; } /* زرار التنبيه */
        .timer { color: #4caf50; font-family: monospace; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1 id="admin-trigger">Medo Style</h1>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="admin-panel">
        <h3 style="text-align:center; color:var(--primary); margin:0 0 15px 0;">⚙️ إعدادات المحل</h3>
        <div id="settings-list"></div>
        <button class="btn" style="background:#2e7d32;" onclick="saveSched()">حفظ المواعيد 💾</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" style="flex:1; background:#1b5e20;" onclick="db.ref('settings/manualClose').set(false)">فتح إجباري</button>
            <button class="btn" style="flex:1; background:#b71c1c;" onclick="db.ref('settings/manualClose').set(true)">قفل إجباري</button>
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>
    <div id="status-box" class="status-bar">جاري التحميل...</div>

    <div class="booking-card" id="booking-ui">
        <input type="text" id="n" placeholder="اسمك الثنائي">
        <input type="tel" id="p" placeholder="رقم الموبايل">
        <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:var(--primary)">اختر ميعاد الحجز:</label>
        <input type="time" id="t_picker">
        <button class="btn" onclick="h()">تأكيد الحجز الآن ✅</button>
        
        <div class="contact-grid">
            <a href="https://wa.me/201097281524" class="btn-wa-main">واتساب</a>
            <a href="tel:+201097281524" class="btn-call-main">اتصال</a>
        </div>
    </div>

    <div class="list" id="q"></div>

    <script>
        const TG_TOKEN = "8646413068:AAEyHPyZexE8hfSZu7pW7xXQG_BGTemnHPs"; 
        const TG_ID = "7155097464"; 

        const conf = {
            apiKey: "AIzaSyAZTbw_9GzgcKcCO3wUdv4Rhy869I3G4XE",
            authDomain: "medostyle-21e06.firebaseapp.com",
            databaseURL: "https://medostyle-21e06-default-rtdb.firebaseio.com",
            projectId: "medostyle-21e06",
            appId: "1:999137802961:web:826621189189a7eb3823f0"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        let isAdmin = false, currentSched = {}, manualClose = false, isFirstLoad = true;
        const dayNames = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

        let holdTimer;
        const trigger = document.getElementById('admin-trigger');
        ['mousedown', 'touchstart'].forEach(e => trigger.addEventListener(e, () => {
            holdTimer = setTimeout(() => {
                let p = prompt("كلمة سر المدير:");
                if(p === "132901") { 
                    isAdmin = true; 
                    document.getElementById('admin-panel').style.display = 'block';
                    refreshAdminUI();
                    db.ref('b').get().then(s => updateList(s));
                }
            }, 3000);
        }));
        ['mouseup', 'touchend', 'mouseleave'].forEach(e => trigger.addEventListener(e, () => clearTimeout(holdTimer)));

        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) { currentSched = data.sched; manualClose = data.manualClose; updateAppUI(); }
        });

        function updateAppUI() {
            const now = new Date(), d = now.getDay(), hr = now.getHours();
            const today = currentSched[d];
            if(!today) return;
            const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
            [5,6,0,1,2,3,4].forEach(i => {
                const s = currentSched[i];
                let txt = s.o==0 ? 'إجازة' : (s.o%12||12)+(s.o>=12?'م':'ص')+' : '+(s.c%12||12)+(s.c>=12?'م':'ص');
                grid.innerHTML += `<div class="day ${i==d?'active':''}"><b>${dayNames[i]}</b>${txt}</div>`;
            });
            const box = document.getElementById('status-box');
            box.innerHTML = !manualClose ? 'المحل مفتوح الآن 🟢' : 'المحل مغلق الآن 🔴';
            box.className = 'status-bar ' + (!manualClose ? 'open' : 'closed');
        }

        function formatTime(timeStr) {
            if(!timeStr) return null;
            let [h, m] = timeStr.split(':');
            let hr = parseInt(h);
            let suffix = hr >= 12 ? "م" : "ص";
            return `${hr % 12 || 12}:${m} ${suffix}`;
        }

        // دالة لحساب هل ميعاد الزبون قرب (باقي 15 دقيقة أو أقل)
        function isTimeNear(targetTime) {
            if(!targetTime) return false;
            const now = new Date();
            let [time, suffix] = targetTime.split(' ');
            let [h, m] = time.split(':');
            let targetHr = parseInt(h);
            if(suffix === "م" && targetHr !== 12) targetHr += 12;
            if(suffix === "ص" && targetHr === 12) targetHr = 0;
            
            const targetDate = new Date();
            targetDate.setHours(targetHr, parseInt(m), 0);
            
            const diff = (targetDate - now) / 1000 / 60; // الفرق بالدقائق
            return diff > 0 && diff <= 15; // لو فاضل من 0 لـ 15 دقيقة
        }

        function h() {
            const n = document.getElementById('n').value, 
                  p = document.getElementById('p').value, 
                  rawTime = document.getElementById('t_picker').value;
            const t = formatTime(rawTime);
            if(!n || !p || !t) return alert("اكمل البيانات");
            db.ref('b').push({ n, p, t, active: false, ts: 0 });
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent("💈 حجز جديد!\nالزبون: "+n+"\nالموعد: "+t)}`);
            alert("تم الحجز بنجاح ✅");
            document.getElementById('n').value = ""; document.getElementById('p').value = "";
        }

        db.ref('b').on('value', snap => {
            updateList(snap);
            if(!isFirstLoad && isAdmin) document.getElementById('notif-sound').play().catch(()=>{});
            isFirstLoad = false;
        });

        function updateList(snap) {
            const q = document.getElementById('q'); q.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(), k = c.key;
                const near = isTimeNear(d.t); // فحص الوقت
                
                q.innerHTML += `
                <div class="row">
                    <div class="row-top">
                        <div><b>${d.n}</b><br><small>${d.t}</small></div>
                        <div class="timer" id="tm-${k}">${d.active ? '..' : 'منتظر'}</div>
                    </div>
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <a href="tel:${d.p}" class="btn-s" style="background:#0288d1;">اتصال 📞</a>
                        ${near ? `<button class="btn-s btn-alert" onclick="sendReminder('${d.p}', '${d.n}')">تنبيه بالدور 🔔</button>` : ''}
                        <button class="btn-s" style="background:#2e7d32;" onclick="run('${k}')">بدء التايمر</button>
                        <button class="btn-s" style="background:#c62828;" onclick="del('${k}')">حذف</button>
                    </div>` : ''}
                </div>`;
            });
        }

        function sendReminder(phone, name) {
            const msg = `يا ${name}، ميعادك قرب في ميدو ستايل.. اجهز عشان دورك فاضل عليه 15 دقيقه! 💈`;
            window.open(`https://wa.me/20${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function run(id) { db.ref('b/'+id).update({ active: true, ts: Date.now() }); }
        function del(id) { if(confirm("أكيد عاوز تحذف؟")) db.ref('b/'+id).remove(); }

        setInterval(() => {
            db.ref('b').once('value', snap => {
                snap.forEach(c => {
                    const d = c.val();
                    if(d.active) {
                        const rem = 3600 - Math.floor((Date.now() - d.ts)/1000);
                        if(rem <= 0) db.ref('b/'+c.key).remove();
                        else {
                            const el = document.getElementById('tm-'+c.key);
                            if(el) el.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                        }
                    }
                });
            });
        }, 1000);

        function refreshAdminUI() {
            const l = document.getElementById('settings-list'); l.innerHTML = "";
            for(let i=0; i<7; i++) {
                l.innerHTML += `<div class="admin-row"><span>${dayNames[i]}</span><div>فت: <input type="number" id="o-${i}" value="${currentSched[i].o}"> قف: <input type="number" id="c-${i}" value="${currentSched[i].c}"></div></div>`;
            }
        }
        function saveSched() {
            let ns = {}; for(let i=0; i<7; i++) { ns[i] = { o: parseInt(document.getElementById(`o-${i}`).value), c: parseInt(document.getElementById(`c-${i}`).value) }; }
            db.ref('settings/sched').set(ns); alert("تم الحفظ!");
        }
    </script>
</body>
</html>
